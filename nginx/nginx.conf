upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

upstream mcp {
    server mcp:8811;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    location /mcp/ {
        proxy_pass http://mcp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        sub_filter_types text/event-stream;
        sub_filter_once off;
        sub_filter '/messages/?session_id=' '/mcp/messages/?session_id=';
    }

    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/paper/(.+)$ {
        set $og_redirect 0;
        if ($http_user_agent ~* "(facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Slackbot|WhatsApp|TelegramBot|Discordbot|Pinterest|Googlebot|bingbot)") {
            set $og_redirect 1;
        }
        if ($og_redirect = 1) {
            rewrite ^/paper/(.+)$ /api/papers/$1/og break;
            proxy_pass http://backend;
        }
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ "^/collections/([0-9a-f\-]{36})$" {
        set $og_redirect 0;
        if ($http_user_agent ~* "(facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Slackbot|WhatsApp|TelegramBot|Discordbot|Pinterest|Googlebot|bingbot)") {
            set $og_redirect 1;
        }
        if ($og_redirect = 1) {
            rewrite "^/collections/([0-9a-f\-]{36})$" /api/collections/$1/og break;
            proxy_pass http://backend;
        }
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
