services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arxiv_radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-arxiv_radar}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arxiv_radar}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - model_cache:/app/model_cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - model_cache:/app/model_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.worker.scheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_IMPRINT_COMPANY: ${VITE_IMPRINT_COMPANY:-}
        VITE_IMPRINT_REPRESENTATIVE: ${VITE_IMPRINT_REPRESENTATIVE:-}
        VITE_IMPRINT_ADDRESS: ${VITE_IMPRINT_ADDRESS:-}
        VITE_IMPRINT_EMAIL: ${VITE_IMPRINT_EMAIL:-}
        VITE_IMPRINT_PHONE: ${VITE_IMPRINT_PHONE:-}
        VITE_IMPRINT_REGISTER: ${VITE_IMPRINT_REGISTER:-}
        VITE_IMPRINT_VAT_ID: ${VITE_IMPRINT_VAT_ID:-}
    restart: unless-stopped
    ports:
      - "5173:80"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  redisdata:
  model_cache:
